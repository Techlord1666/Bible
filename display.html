<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Bible Verse Display</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Cinzel:wght@400;600&family=EB+Garamond:ital,wght@0,400;1,400&display=swap" rel="stylesheet" />

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --gold: #c9a84c;
    --gold-light: #e8c97a;
    --gold-dim: #8a6f30;
    --cream: #f5f0e8;
    --dark: #0a0a0f;
    --dark-mid: #12121a;
    --dark-card: #16161f;
    --text-main: #f0ead8;
    --text-dim: #8a8070;
  }

  html, body {
    width: 100%; height: 100%;
    background: var(--dark);
    color: var(--text-main);
    font-family: 'Cormorant Garamond', Georgia, serif;
    overflow: hidden;
  }

  /* ── Background ── */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background:
      radial-gradient(ellipse 80% 60% at 50% 0%, rgba(201,168,76,0.08) 0%, transparent 70%),
      radial-gradient(ellipse 60% 40% at 50% 100%, rgba(201,168,76,0.05) 0%, transparent 70%),
      linear-gradient(180deg, #0a0a0f 0%, #0e0e16 50%, #0a0a0f 100%);
    pointer-events: none;
    z-index: 0;
  }

  /* Subtle cross watermark */
  body::after {
    content: '✝';
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    font-size: 55vw;
    color: rgba(201,168,76,0.025);
    pointer-events: none;
    z-index: 0;
    line-height: 1;
    font-family: serif;
  }

  /* ── Decorative corner borders ── */
  .corner {
    position: fixed;
    width: 80px; height: 80px;
    border-color: var(--gold-dim);
    border-style: solid;
    opacity: 0.4;
    z-index: 1;
    transition: opacity 0.5s;
  }
  .corner-tl { top: 24px; left: 24px; border-width: 2px 0 0 2px; }
  .corner-tr { top: 24px; right: 24px; border-width: 2px 2px 0 0; }
  .corner-bl { bottom: 24px; left: 24px; border-width: 0 0 2px 2px; }
  .corner-br { bottom: 24px; right: 24px; border-width: 0 2px 2px 0; }

  /* ── Main stage ── */
  #stage {
    position: relative;
    z-index: 2;
    width: 100%; height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 6vw 8vw;
    text-align: center;
  }

  /* ── Idle screen ── */
  #idle-screen {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 28px;
    animation: fadeIn 1.2s ease forwards;
  }

  .idle-cross {
    font-size: 4rem;
    color: var(--gold-dim);
    animation: breathe 4s ease-in-out infinite;
  }

  .idle-title {
    font-family: 'Cinzel', serif;
    font-size: clamp(1.2rem, 2.5vw, 2rem);
    letter-spacing: 0.3em;
    color: var(--gold-dim);
    text-transform: uppercase;
  }

  .idle-sub {
    font-size: clamp(0.9rem, 1.5vw, 1.2rem);
    color: var(--text-dim);
    font-style: italic;
    letter-spacing: 0.05em;
  }

  /* ── Verse display ── */
  #verse-screen {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: clamp(20px, 3vh, 48px);
    max-width: 1200px;
    width: 100%;
  }

  /* Divider ornament */
  .ornament {
    display: flex;
    align-items: center;
    gap: 16px;
    width: 100%;
    max-width: 500px;
  }
  .ornament-line {
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold-dim), transparent);
  }
  .ornament-icon {
    color: var(--gold);
    font-size: 1.1rem;
    opacity: 0.7;
  }

  /* Reference header */
  .verse-reference {
    font-family: 'Cinzel', serif;
    font-size: clamp(1.4rem, 3.5vw, 3rem);
    font-weight: 600;
    color: var(--gold);
    letter-spacing: 0.08em;
    line-height: 1.2;
    text-shadow: 0 0 60px rgba(201,168,76,0.3);
    animation: slideDown 0.7s cubic-bezier(0.23, 1, 0.32, 1) forwards;
  }

  /* Verse body text */
  .verse-text {
    font-size: clamp(1.8rem, 4.5vw, 5rem);
    font-weight: 300;
    line-height: 1.55;
    color: var(--text-main);
    max-width: 1100px;
    letter-spacing: 0.01em;
    text-shadow: 0 2px 40px rgba(0,0,0,0.5);
    animation: fadeScaleIn 0.8s cubic-bezier(0.23, 1, 0.32, 1) 0.1s both;
  }

  /* Opening quotation mark */
  .verse-text::before {
    content: '\201C';
    font-size: 1.4em;
    color: var(--gold-dim);
    opacity: 0.5;
    vertical-align: -0.25em;
    margin-right: 4px;
    font-style: italic;
  }

  /* Translation badge */
  .verse-translation {
    font-family: 'Cinzel', serif;
    font-size: clamp(0.75rem, 1.5vw, 1.1rem);
    letter-spacing: 0.25em;
    color: var(--gold-dim);
    text-transform: uppercase;
    border: 1px solid rgba(201,168,76,0.25);
    padding: 6px 20px;
    border-radius: 2px;
    background: rgba(201,168,76,0.04);
    animation: fadeIn 0.6s ease 0.4s both;
  }

  /* ── Error state ── */
  #error-screen {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 20px;
  }

  .error-icon { font-size: 3rem; opacity: 0.5; }
  .error-msg {
    font-family: 'Cinzel', serif;
    font-size: clamp(1rem, 2vw, 1.5rem);
    color: var(--text-dim);
    letter-spacing: 0.1em;
  }

  /* ── Status indicator (bottom) ── */
  #status-bar {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    align-items: center;
    gap: 10px;
    z-index: 10;
    opacity: 0.5;
    transition: opacity 0.3s;
  }
  #status-bar:hover { opacity: 1; }

  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--text-dim);
    transition: background 0.3s;
  }
  .status-dot.listening {
    background: #4ade80;
    animation: pulse-dot 1.5s ease-in-out infinite;
  }
  .status-dot.error { background: #f87171; }

  .status-text {
    font-family: 'Cinzel', serif;
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    color: var(--text-dim);
    text-transform: uppercase;
  }

  /* ── Transition overlay ── */
  #transition {
    position: fixed; inset: 0;
    background: var(--dark);
    z-index: 100;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s ease;
  }
  #transition.active { opacity: 1; }

  /* ── Animations ── */
  @keyframes fadeIn {
    from { opacity: 0; } to { opacity: 1; }
  }
  @keyframes slideDown {
    from { opacity: 0; transform: translateY(-20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeScaleIn {
    from { opacity: 0; transform: scale(0.97); }
    to { opacity: 1; transform: scale(1); }
  }
  @keyframes breathe {
    0%, 100% { opacity: 0.3; transform: scale(1); }
    50% { opacity: 0.6; transform: scale(1.05); }
  }
  @keyframes pulse-dot {
    0%, 100% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.4); opacity: 0.7; }
  }
</style>
</head>
<body>

<!-- Corner decorations -->
<div class="corner corner-tl"></div>
<div class="corner corner-tr"></div>
<div class="corner corner-bl"></div>
<div class="corner corner-br"></div>

<!-- Transition flash -->
<div id="transition"></div>

<!-- Main stage -->
<div id="stage">

  <!-- Idle -->
  <div id="idle-screen">
    <div class="idle-cross">✝</div>
    <div class="idle-title">Bible Verse Presentation</div>
    <div class="idle-sub">Awaiting voice command…</div>
  </div>

  <!-- Verse -->
  <div id="verse-screen">
    <div class="verse-reference" id="ref-display"></div>
    <div class="ornament">
      <div class="ornament-line"></div>
      <div class="ornament-icon">✦</div>
      <div class="ornament-line"></div>
    </div>
    <div class="verse-text" id="verse-text-display"></div>
    <div class="ornament">
      <div class="ornament-line"></div>
      <div class="ornament-icon">✦</div>
      <div class="ornament-line"></div>
    </div>
    <div class="verse-translation" id="translation-badge"></div>
  </div>

  <!-- Error -->
  <div id="error-screen">
    <div class="error-icon">⚠</div>
    <div class="error-msg" id="error-text">Reference not found</div>
  </div>

</div>

<!-- Status bar -->
<div id="status-bar">
  <div class="status-dot" id="status-dot"></div>
  <div class="status-text" id="status-text">Connecting…</div>
</div>

<script>
const idle    = document.getElementById('idle-screen');
const verseEl = document.getElementById('verse-screen');
const errorEl = document.getElementById('error-screen');
const refEl   = document.getElementById('ref-display');
const textEl  = document.getElementById('verse-text-display');
const transEl = document.getElementById('translation-badge');
const errorTx = document.getElementById('error-text');
const dot     = document.getElementById('status-dot');
const statusT = document.getElementById('status-text');
const overlay = document.getElementById('transition');

function showScreen(name) {
  overlay.classList.add('active');
  setTimeout(() => {
    idle.style.display    = 'none';
    verseEl.style.display = 'none';
    errorEl.style.display = 'none';

    if (name === 'idle')  idle.style.display    = 'flex';
    if (name === 'verse') verseEl.style.display = 'flex';
    if (name === 'error') errorEl.style.display = 'flex';

    overlay.classList.remove('active');
  }, 300);
}

function displayVerse(data) {
  refEl.textContent   = data.reference || '';
  textEl.textContent  = data.text || '';
  transEl.textContent = data.translation || 'KJV';
  showScreen('verse');
}

function setStatus(listening) {
  dot.className = 'status-dot' + (listening ? ' listening' : '');
  statusT.textContent = listening ? 'Listening' : 'Standby';
}

// ── SSE connection ──────────────────────────────────────────────────────────
let evtSource;

function connect() {
  evtSource = new EventSource('/api/stream');

  evtSource.onopen = () => {
    statusT.textContent = 'Connected';
  };

  evtSource.onmessage = (e) => {
    const msg = JSON.parse(e.data);

    if (msg.type === 'ping') return;

    if (msg.type === 'init') {
      const d = msg.data;
      if (d.status === 'displaying' && d.text) displayVerse(d);
      else showScreen('idle');
      setStatus(false);
    }

    if (msg.type === 'verse') {
      displayVerse(msg.data);
    }

    if (msg.type === 'clear') {
      showScreen('idle');
    }

    if (msg.type === 'status') {
      setStatus(msg.data.listening);
    }

    if (msg.type === 'error') {
      errorTx.textContent = msg.data.message || 'Unknown error';
      showScreen('error');
      setTimeout(() => showScreen('idle'), 4000);
    }
  };

  evtSource.onerror = () => {
    statusT.textContent = 'Reconnecting…';
    dot.className = 'status-dot error';
    evtSource.close();
    setTimeout(connect, 3000);
  };
}

connect();

// Prevent screen saver / sleep on modern browsers
document.addEventListener('click', () => {});
</script>
</body>
</html>
